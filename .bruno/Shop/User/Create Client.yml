info:
  name: Create Client
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/users"
  body:
    type: json
    data: |-
      {
        "name": "{{name}}",
        "email": "{{email}}",
        "password": "123456",
        "userTypeId": "{{client}}"
      }
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        const name = bru.interpolate("{{$randomFullName}}");
        const email = bru.interpolate("{{$randomEmail}}");

        bru.setVar("name", name);
        bru.setVar("email", email);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
